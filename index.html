<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZONE | Rack-Mount Power</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-green: #39FF14;
            --neon-purple: #BC13FE;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--neon-purple);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
            color: var(--neon-green);
        }

        .hero {
            max-width: 600px;
            padding: 20px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
            background: rgba(188, 19, 254, 0.05);
        }

        .cta-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 15px 30px;
            background-color: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .cta-button:hover {
            background-color: var(--neon-green);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--neon-green);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--neon-purple);
        }
    </style>
</head>
<body>

    <header>
        <h1>GameZONE Gaming Console</h1>
    </header>

    <main class="hero">
        <h2>Server-Grade Performance. Living Room Aesthetics.</h2>
        <p>The ultimate rack-mount gaming console built for enthusiasts who demand power, stability, and a modular footprint.</p>
        <a href="#" class="cta-button">Coming Soon</a>
    </main>

    <footer>
        &copy; 2026 GameZONE
        <a href="admin.html" class="cta-button">Admin</a>
    </footer>

</body>
</html>
